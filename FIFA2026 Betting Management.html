                                                    <!-- Toast -->
                                                    <div class="toast" id="toast" style="display:none;"></div>
                                                    <script>
                                                        (function() {
                                                            // ============ DOM元素 ============
                                                            const $ = (sel) => document.querySelector(sel);
                                                            const $$ = (sel) => document.querySelectorAll(sel);
                                                            const inputDate = $('#inputDate');
                                                            const inputMatch = $('#inputMatch');
                                                            const inputBetType = $('#inputBetType');
                                                            const inputOdds = $('#inputOdds');
                                                            const inputAmount = $('#inputAmount');
                                                            const inputResult = $('#inputResult');
                                                            const inputReturn = $('#inputReturn');
                                                            const btnAdd = $('#btnAdd');
                                                            const tableBody = $('#tableBody');
                                                            const dailyBody = $('#dailyBody');
                                                            const editModal = $('#editModal');
                                                            const btnCancelEdit = $('#btnCancelEdit');
                                                            const btnSaveEdit = $('#btnSaveEdit');
                                                            const btnExport = $('#btnExport');
                                                            const btnClearAll = $('#btnClearAll');
                                                            const formToggle = $('#formToggle');
                                                            const formBody = $('#formBody');
                                                            const toggleBtn = $('#toggleBtn');
                                                            const toastEl = $('#toast');
                                                            // 编辑模态框字段
                                                            const editDate = $('#editDate');
                                                            const editMatch = $('#editMatch');
                                                            const editBetType = $('#editBetType');
                                                            const editOdds = $('#editOdds');
                                                            const editAmount = $('#editAmount');
                                                            const editResult = $('#editResult');
                                                            const editReturn = $('#editReturn');
                                                            let currentEditId = null;
                                                            let records = [];
                                                            let toastTimer = null;
                                                            // ============ 数据管理 ============
                                                            const STORAGE_KEY = 'worldCup2026BetRecords';
                                                            function loadRecords() {
                                                                try {
                                                                    const raw = localStorage.getItem(STORAGE_KEY);
                                                                    if (raw) {
                                                                        records = JSON.parse(raw);
                                                                        if (!Array.isArray(records)) records = [];
                                                                    } else {
                                                                        records = [];
                                                                    }
                                                                } catch (e) {
                                                                    records = [];
                                                                }
                                                                // 按日期降序排列
                                                                records.sort((a, b) => {
                                                                    if (a.date !== b.date) return b.date.localeCompare(a.date);
                                                                    return b.id - a.id;
                                                                });
                                                            }
                                                            function saveRecords() {
                                                                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                                                            }
                                                            function generateId() {
                                                                return Date.now() + Math.floor(Math.random() * 10000);
                                                            }
                                                            // ============ Toast ============
                                                            function showToast(msg) {
                                                                if (toastTimer) clearTimeout(toastTimer);
                                                                toastEl.textContent = msg;
                                                                toastEl.style.display = 'block';
                                                                toastEl.style.animation = 'none';
                                                                void toastEl.offsetWidth;
                                                                toastEl.style.animation = 'toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards';
                                                                toastTimer = setTimeout(() => {
                                                                    toastEl.style.display = 'none';
                                                                }, 2200);
                                                            }
                                                            // ============ 渲染 ============
                                                            function renderAll() {
                                                                renderTable();
                                                                renderDailySummary();
                                                                renderGlobalSummary();
                                                            }
                                                            function getReturnDisplay(record) {
                                                                if (record.result === 'lose') return { value: 0, display: '0', cssClass: 'lose' };
                                                                if (record.result === 'pending') return { value: null, display: '-',
                                                                    cssClass: 'pending' };
                                                                return { value: record.return || 0, display: (record.return || 0).toFixed(
                                                                        2), cssClass: 'win' };
                                                            }
                                                            function renderTable() {
                                                                if (records.length === 0) {
                                                                    tableBody.innerHTML = `
                                                                        <tr class="empty-state">
                                                                            <td colspan="8">
                                                                                <div class="empty-icon">📭</div>
                                                                                <p>暂无记录，快添加第一条投注吧！</p>
                                                                            </td>
                                                                        </tr>`;
                                                                    return;
                                                                }
                                                                tableBody.innerHTML = records.map(r => {
                                                                    const ret = getReturnDisplay(r);
                                                                    const oddsDisplay = r.odds ? parseFloat(r.odds).toFixed(
                                                                        2) : '-';
                                                                    const rowClass = r.result === 'win' ? 'row-win' : r
                                                                        .result === 'lose' ? 'row-lose' : 'row-pending';
                                                                    const badgeClass = r.result === 'win' ? 'badge-win' :
                                                                        r.result === 'lose' ? 'badge-lose' :
                                                                        'badge-pending';
                                                                    const badgeText = r.result === 'win' ? '✅ 赢' : r
                                                                        .result === 'lose' ? '❌ 输' : '⏳ 待定';
                                                                    const returnDisplay = ret.display;
                                                                    const returnClass = ret.cssClass;
                                                                    const returnDisabled = r.result !== 'win' ?
                                                                        'disabled' : '';
                                                                    const returnValue = r.result === 'win' ? (r
                                                                        .return || 0).toFixed(2) : (r.result ===
                                                                        'lose' ? '0' : '');
                                                                    return `
                                                                        <tr class="${rowClass}" data-id="${r.id}">
                                                                            <td>${escapeHtml(r.date)}</td>
                                                                            <td>${escapeHtml(r.matchName)}</td>
                                                                            <td>${escapeHtml(r.betType)}</td>
                                                                            <td style="text-align:center;font-family:var(--font-mono);">${oddsDisplay}</td>
                                                                            <td class="amount-cell">¥${parseFloat(r.amount).toFixed(2)}</td>
                                                                            <td>
                                                                                <select class="inline-select result-select" data-id="${r.id}" style="min-width:85px;">
                                                                                    <option value="win" ${r.result==='win'?'selected':''}>✅ 赢</option>
                                                                                    <option value="lose" ${r.result==='lose'?'selected':''}>❌ 输</option>
                                                                                    <option value="pending" ${r.result==='pending'?'selected':''}>⏳ 待定</option>
                                                                                </select>
                                                                            </td>
                                                                            <td class="return-cell ${returnClass}">
                                                                                <input type="number" 
                                                                                       class="inline-input return-input" 
                                                                                       data-id="${r.id}" 
                                                                                       value="${returnValue}" 
                                                                                       step="0.01" min="0"
                                                                                       ${returnDisabled}
                                                                                       style="width:95px;">
                                                                            </td>
                                                                            <td class="actions-cell">
                                                                                <button class="btn btn-edit btn-sm edit-btn" data-id="${r.id}">✏️ 编辑</button>
                                                                                <button class="btn btn-delete btn-sm delete-btn" data-id="${r.id}">🗑️ 删除</button>
                                                                            </td>
                                                                        </tr>`;
                                                                }).join('');
                                                                // 绑定事件
                                                                bindTableEvents();
                                                            }
                                                            function bindTableEvents() {
                                                                // 结果下拉改变
                                                                tableBody.querySelectorAll('.result-select').forEach(sel => {
                                                                    sel.addEventListener('change', function() {
                                                                        const id = parseInt(this.dataset
                                                                            .id);
                                                                        const record = records.find(r => r
                                                                            .id === id);
                                                                        if (!record) return;
                                                                        const newResult = this.value;
                                                                        record.result = newResult;
                                                                        if (newResult === 'lose') {
                                                                            record.return = 0;
                                                                        } else if (newResult ===
                                                                            'pending') {
                                                                            record.return = null;
                                                                        } else if (newResult === 'win') {
                                                                            if (record.odds && record
                                                                                .amount) {
                                                                                record.return = parseFloat(
                                                                                    (parseFloat(
                                                                                        record
                                                                                        .amount) *
                                                                                        parseFloat(
                                                                                            record
                                                                                            .odds)
                                                                                    ).toFixed(
                                                                                        2));
                                                                            } else if (record
                                                                                .return === null ||
                                                                                record.return ===
                                                                                undefined || record
                                                                                .return === 0) {
                                                                                record.return = null;
                                                                            }
                                                                        }
                                                                        saveRecords();
                                                                        renderAll();
                                                                        showToast(
                                                                            `结果已更新为「${newResult==='win'?'赢':newResult==='lose'?'输':'待定'}」`
                                                                            );
                                                                    });
                                                                });
                                                                // 回报输入改变
                                                                tableBody.querySelectorAll('.return-input').forEach(inp => {
                                                                    inp.addEventListener('change', function() {
                                                                        const id = parseInt(this
                                                                            .dataset.id);
                                                                        const record = records.find(
                                                                            r => r.id === id);
                                                                        if (!record) return;
                                                                        if (record.result ===
                                                                            'win') {
                                                                            const val = parseFloat(
                                                                                this.value);
                                                                            record.return =
                                                                                isNaN(val) ?
                                                                                null : parseFloat(
                                                                                    val.toFixed(
                                                                                        2));
                                                                            saveRecords();
                                                                            renderAll();
                                                                            showToast(
                                                                                '回报金额已更新');
                                                                        }
                                                                    });
                                                                });
                                                                // 编辑按钮
                                                                tableBody.querySelectorAll('.edit-btn').forEach(btn => {
                                                                    btn.addEventListener('click', function() {
                                                                        const id = parseInt(this
                                                                            .dataset.id);
                                                                        openEditModal(id);
                                                                    });
                                                                });
                                                                // 删除按钮
                                                                tableBody.querySelectorAll('.delete-btn').forEach(btn => {
                                                                    btn.addEventListener('click', function() {
                                                                        const id = parseInt(this
                                                                            .dataset.id);
                                                                        deleteRecord(id);
                                                                    });
                                                                });
                                                            }
                                                            function renderDailySummary() {
                                                                // 按日期分组
                                                                const grouped = {};
                                                                records.forEach(r => {
                                                                    if (!grouped[r.date]) grouped[r.date] = [];
                                                                    grouped[r.date].push(r);
                                                                });
                                                                const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(
                                                                    a));
                                                                if (dates.length === 0) {
                                                                    dailyBody.innerHTML =
                                                                        '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px;">暂无数据</td></tr>';
                                                                    return;
                                                                }
                                                                dailyBody.innerHTML = dates.map(date => {
                                                                    const dayRecords = grouped[date];
                                                                    const totalInvest = dayRecords.reduce((sum, r) =>
                                                                        sum + parseFloat(r.amount), 0);
                                                                    const settledRecords = dayRecords.filter(r => r
                                                                        .result !== 'pending');
                                                                    const totalReturn = dayRecords.reduce((sum, r) => {
                                                                        if (r.result === 'win') return sum + (
                                                                            r.return || 0);
                                                                        if (r.result === 'lose') return sum +
                                                                            0;
                                                                        return sum;
                                                                    }, 0);
                                                                    const profit = totalReturn - totalInvest;
                                                                    const hasPending = dayRecords.some(r => r
                                                                        .result === 'pending');
                                                                    const profitClass = profit > 0.01 ?
                                                                        'profit-positive' : profit < -0.01 ?
                                                                        'profit-negative' : 'profit-zero';
                                                                    const statusBadge = hasPending ?
                                                                        '<span style="color:#e67e22;font-size:0.75rem;">⚠️ 有待定</span>' :
                                                                        '<span style="color:#2e7d32;font-size:0.75rem;">✓ 全部结算</span>';
                                                                    return `
                                                                        <tr>
                                                                            <td><strong>${date}</strong></td>
                                                                            <td>${dayRecords.length} 笔</td>
                                                                            <td class="amount-cell">¥${totalInvest.toFixed(2)}</td>
                                                                            <td class="amount-cell">¥${totalReturn.toFixed(2)}</td>
                                                                            <td class="amount-cell ${profitClass}">${profit>=0?'+':''}¥${profit.toFixed(2)}</td>
                                                                            <td>${statusBadge}</td>
                                                                        </tr>`;
                                                                }).join('');
                                                            }
                                                            function renderGlobalSummary() {
                                                                const totalInvest = records.reduce((sum, r) => sum + parseFloat(r
                                                                    .amount), 0);
                                                                const settledRecords = records.filter(r => r.result !== 'pending');
                                                                const totalReturn = records.reduce((sum, r) => {
                                                                    if (r.result === 'win') return sum + (r.return || 0);
                                                                    if (r.result === 'lose') return sum + 0;
                                                                    return sum;
                                                                }, 0);
                                                                const profit = totalReturn - totalInvest;
                                                                const winCount = records.filter(r => r.result === 'win').length;
                                                                const loseCount = records.filter(r => r.result === 'lose').length;
                                                                const pendingCount = records.filter(r => r.result === 'pending')
                                                                    .length;
                                                                const settledCount = winCount + loseCount;
                                                                const winRate = settledCount > 0 ? ((winCount / settledCount) * 100)
                                                                    .toFixed(1) + '%' : '-';
                                                                const roi = totalInvest > 0 ? ((profit / totalInvest) * 100).toFixed(
                                                                    1) + '%' : '-';
                                                                $('#totalInvest').textContent = '¥' + totalInvest.toFixed(2);
                                                                $('#totalReturn').textContent = '¥' + totalReturn.toFixed(2);
                                                                $('#totalProfit').textContent = (profit >= 0 ? '+' : '') + '¥' + profit
                                                                    .toFixed(2);
                                                                $('#totalBets').textContent = '共 ' + records.length + ' 笔';
                                                                $('#settledInfo').textContent = '已结算 ' + settledCount + ' 笔';
                                                                $('#roiInfo').textContent = '回报率: ' + roi;
                                                                $('#winRate').textContent = winRate;
                                                                $('#winLossSummary').textContent = '赢' + winCount + ' / 输' + loseCount +
                                                                    ' / 待定' + pendingCount;
                                                                const profitCard = $('#profitCard');
                                                                profitCard.classList.remove('positive', 'negative');
                                                                if (profit > 0.01) profitCard.classList.add('positive');
                                                                if (profit < -0.01) profitCard.classList.add('negative');
                                                            }
                                                            function escapeHtml(str) {
                                                                if (!str) return '';
                                                                const div = document.createElement('div');
                                                                div.textContent = str;
                                                                return div.innerHTML;
                                                            }
                                                            // ============ 添加记录 ============
                                                            function addRecord() {
                                                                const date = inputDate.value.trim();
                                                                const matchName = inputMatch.value.trim();
                                                                const betType = inputBetType.value.trim();
                                                                const oddsStr = inputOdds.value.trim();
                                                                const amountStr = inputAmount.value.trim();
                                                                const result = inputResult.value;
                                                                const returnStr = inputReturn.value.trim();
                                                                if (!date) { showToast('⚠️ 请选择日期'); return; }
                                                                if (!matchName) { showToast('⚠️ 请填写比赛名'); return; }
                                                                if (!betType) { showToast('⚠️ 请填写投注方向'); return; }
                                                                if (!amountStr || parseFloat(amountStr) <= 0) { showToast(
                                                                        '⚠️ 请填写有效的投注金额'); return; }
                                                                const amount = parseFloat(parseFloat(amountStr).toFixed(2));
                                                                const odds = oddsStr ? parseFloat(parseFloat(oddsStr).toFixed(2)) :
                                                                    null;
                                                                let returnVal = null;
                                                                if (result === 'lose') {
                                                                    returnVal = 0;
                                                                } else if (result === 'win') {
                                                                    if (odds && amount) {
                                                                        returnVal = parseFloat((amount * odds).toFixed(2));
                                                                    } else if (returnStr) {
                                                                        returnVal = parseFloat(parseFloat(returnStr).toFixed(2));
                                                                    } else {
                                                                        returnVal = null;
                                                                    }
                                                                }
                                                                const record = {
                                                                    id: generateId(),
                                                                    date,
                                                                    matchName,
                                                                    betType,
                                                                    odds,
                                                                    amount,
                                                                    result,
                                                                    return: returnVal,
                                                                };
                                                                records.push(record);
                                                                records.sort((a, b) => {
                                                                    if (a.date !== b.date) return b.date.localeCompare(a.date);
                                                                    return b.id - a.id;
                                                                });
                                                                saveRecords();
                                                                clearForm();
                                                                renderAll();
                                                                showToast('✅ 记录添加成功！');
                                                            }
                                                            function clearForm() {
                                                                inputMatch.value = '';
                                                                inputBetType.value = '';
                                                                inputOdds.value = '';
                                                                inputAmount.value = '';
                                                                inputResult.value = 'pending';
                                                                inputReturn.value = '';
                                                                inputDate.value = getTodayStr();
                                                                inputMatch.focus();
                                                            }
                                                            function getTodayStr() {
                                                                const d = new Date();
                                                                return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,
                                                                    '0') + '-' + String(d.getDate()).padStart(2, '0');
                                                            }
                                                            // ============ 编辑记录 ============
                                                            function openEditModal(id) {
                                                                const record = records.find(r => r.id === id);
                                                                if (!record) return;
                                                                currentEditId = id;
                                                                editDate.value = record.date;
                                                                editMatch.value = record.matchName;
                                                                editBetType.value = record.betType;
                                                                editOdds.value = record.odds || '';
                                                                editAmount.value = record.amount;
                                                                editResult.value = record.result;
                                                                editReturn.value = record.result === 'win' ? (record.return || '') :
                                                                    (record.result === 'lose' ? '0' : '');
                                                                editReturn.disabled = record.result !== 'win';
                                                                editModal.style.display = 'flex';
                                                            }
                                                            function closeEditModal() {
                                                                editModal.style.display = 'none';
                                                                currentEditId = null;
                                                            }
                                                            function saveEdit() {
                                                                const record = records.find(r => r.id === currentEditId);
                                                                if (!record) return;
                                                                const date = editDate.value.trim();
                                                                const matchName = editMatch.value.trim();
                                                                const betType = editBetType.value.trim();
                                                                const oddsStr = editOdds.value.trim();
                                                                const amountStr = editAmount.value.trim();
                                                                const result = editResult.value;
                                                                const returnStr = editReturn.value.trim();
                                                                if (!date || !matchName || !betType || !amountStr || parseFloat(
                                                                        amountStr) <= 0) {
                                                                    showToast('⚠️ 请完善必填字段');
                                                                    return;
                                                                }
                                                                record.date = date;
                                                                record.matchName = matchName;
                                                                record.betType = betType;
                                                                record.odds = oddsStr ? parseFloat(parseFloat(oddsStr).toFixed(2)) :
                                                                    null;
                                                                record.amount = parseFloat(parseFloat(amountStr).toFixed(2));
                                                                record.result = result;
                                                                if (result === 'lose') {
                                                                    record.return = 0;
                                                                } else if (result === 'pending') {
                                                                    record.return = null;
                                                                } else if (result === 'win') {
                                                                    if (returnStr && parseFloat(returnStr) >= 0) {
                                                                        record.return = parseFloat(parseFloat(returnStr).toFixed(
                                                                            2));
                                                                    } else if (record.odds && record.amount) {
                                                                        record.return = parseFloat((record.amount * record.odds)
                                                                            .toFixed(2));
                                                                    } else {
                                                                        record.return = null;
                                                                    }
                                                                }
                                                                records.sort((a, b) => {
                                                                    if (a.date !== b.date) return b.date.localeCompare(a.date);
                                                                    return b.id - a.id;
                                                                });
                                                                saveRecords();
                                                                closeEditModal();
                                                                renderAll();
                                                                showToast('✅ 记录修改成功！');
                                                            }
                                                            // 编辑模态框中结果改变
                                                            editResult.addEventListener('change', function() {
                                                                const res = this.value;
                                                                if (res === 'lose') {
                                                                    editReturn.value = '0';
                                                                    editReturn.disabled = true;
                                                                } else if (res === 'pending') {
                                                                    editReturn.value = '';
                                                                    editReturn.disabled = true;
                                                                } else if (res === 'win') {
                                                                    editReturn.disabled = false;
                                                                    const record = records.find(r => r.id ===
                                                                        currentEditId);
                                                                    if (record && record.odds && record.amount && !editReturn
                                                                        .value) {
                                                                        editReturn.value = (parseFloat(record.amount) *
                                                                            parseFloat(record.odds)).toFixed(2);
                                                                    }
                                                                }
                                                            });
                                                            // ============ 删除记录 ============
                                                            function deleteRecord(id) {
                                                                const record = records.find(r => r.id === id);
                                                                if (!record) return;
                                                                const matchInfo = record.matchName + ' (' + record.date + ')';
                                                                if (confirm('确定要删除这条记录吗？\n\n' + matchInfo + '\n\n此操作不可恢复。')) {
                                                                    records = records.filter(r => r.id !== id);
                                                                    saveRecords();
                                                                    renderAll();
                                                                    showToast('🗑️ 记录已删除');
                                                                }
                                                            }
                                                            function clearAllRecords() {
                                                                if (records.length === 0) {
                                                                    showToast('没有记录可清空');
                                                                    return;
                                                                }
                                                                if (confirm('⚠️ 确定要清空全部 ' + records.length +
                                                                        ' 条记录吗？\n\n此操作不可恢复！\n建议先导出CSV备份。')) {
                                                                    records = [];
                                                                    saveRecords();
                                                                    renderAll();
                                                                    showToast('🗑️ 全部记录已清空');
                                                                }
                                                            }
                                                            // ============ 导出CSV ============
                                                            function exportCSV() {
                                                                if (records.length === 0) {
                                                                    showToast('⚠️ 没有数据可导出');
                                                                    return;
                                                                }
                                                                const headers = ['日期', '比赛名', '投注方向', '赔率', '投注金额', '结果', '回报金额'];
                                                                const rows = records.map(r => {
                                                                    const resultText = r.result === 'win' ? '赢' : r.result ===
                                                                        'lose' ? '输' : '待定';
                                                                    const retVal = r.result === 'win' ? (r.return || 0) : r
                                                                        .result === 'lose' ? 0 : '';
                                                                    return [
                                                                        r.date,
                                                                        '"' + (r.matchName || '').replace(/"/g, '""') +
                                                                        '"',
                                                                        '"' + (r.betType || '').replace(/"/g, '""') +
                                                                        '"',
                                                                        r.odds || '',
                                                                        r.amount,
                                                                        resultText,
                                                                        retVal,
                                                                    ];
                                                                });
                                                                const csvContent = [headers.join(','), ...rows.map(r => r.join(','))]
                                                                    .join('\n');
                                                                const BOM = '\uFEFF';
                                                                const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
                                                                const url = URL.createObjectURL(blob);
                                                                const link = document.createElement('a');
                                                                link.href = url;
                                                                link.download = '世界杯彩票记录_' + getTodayStr() + '.csv';
                                                                document.body.appendChild(link);
                                                                link.click();
                                                                document.body.removeChild(link);
                                                                URL.revokeObjectURL(url);
                                                                showToast('📥 CSV导出成功！');
                                                            }
                                                            // ============ 表单折叠 ============
                                                            function toggleForm() {
                                                                const collapsed = formBody.classList.toggle('collapsed');
                                                                toggleBtn.textContent = collapsed ? '展开 ▼' : '收起 ▲';
                                                                try {
                                                                    localStorage.setItem('wcFormCollapsed', collapsed ? '1' : '0');
                                                                } catch (e) {}
                                                            }
                                                            // ============ 输入联动 ============
                                                            inputResult.addEventListener('change', function() {
                                                                const res = this.value;
                                                                if (res === 'lose') {
                                                                    inputReturn.value = '0';
                                                                    inputReturn.disabled = true;
                                                                } else if (res === 'pending') {
                                                                    inputReturn.value = '';
                                                                    inputReturn.disabled = true;
                                                                } else if (res === 'win') {
                                                                    inputReturn.disabled = false;
                                                                    const odds = parseFloat(inputOdds.value);
                                                                    const amount = parseFloat(inputAmount.value);
                                                                    if (odds && amount && !inputReturn.value) {
                                                                        inputReturn.value = (amount * odds).toFixed(2);
                                                                    }
                                                                }
                                                            });
                                                            inputOdds.addEventListener('change', function() {
                                                                const res = inputResult.value;
                                                                if (res === 'win') {
                                                                    const odds = parseFloat(this.value);
                                                                    const amount = parseFloat(inputAmount.value);
                                                                    if (odds && amount) {
                                                                        inputReturn.value = (amount * odds).toFixed(2);
                                                                    }
                                                                }
                                                            });
                                                            inputAmount.addEventListener('change', function() {
                                                                const res = inputResult.value;
                                                                if (res === 'win') {
                                                                    const odds = parseFloat(inputOdds.value);
                                                                    const amount = parseFloat(this.value);
                                                                    if (odds && amount) {
                                                                        inputReturn.value = (amount * odds).toFixed(2);
                                                                    }
                                                                }
                                                            });
                                                            // ============ 事件绑定 ============
                                                            btnAdd.addEventListener('click', addRecord);
                                                            btnCancelEdit.addEventListener('click', closeEditModal);
                                                            btnSaveEdit.addEventListener('click', saveEdit);
                                                            btnExport.addEventListener('click', exportCSV);
                                                            btnClearAll.addEventListener('click', clearAllRecords);
                                                            formToggle.addEventListener('click', toggleForm);
                                                            editModal.addEventListener('click', function(e) {
                                                                if (e.target === editModal) closeEditModal();
                                                            });
                                                            // 键盘快捷键
                                                            document.addEventListener('keydown', function(e) {
                                                                if (e.key === 'Escape') {
                                                                    if (editModal.style.display === 'flex') {
                                                                        closeEditModal();
                                                                    }
                                                                }
                                                                if (e.ctrlKey && e.key === 'Enter') {
                                                                    if (editModal.style.display === 'flex') {
                                                                        saveEdit();
                                                                    } else if (document.activeElement && document
                                                                        .activeElement.closest('#formBody') && !document
                                                                        .activeElement.closest('#editModal')) {
                                                                        addRecord();
                                                                    }
                                                                }
                                                            });
                                                            // ============ 初始化 ============
                                                            function init() {
                                                                loadRecords();
                                                                inputDate.value = getTodayStr();
                                                                inputReturn.disabled = true;
                                                                renderAll();
                                                                // 恢复表单折叠状态
                                                                try {
                                                                    const collapsed = localStorage.getItem('wcFormCollapsed');
                                                                    if (collapsed === '1') {
                                                                        formBody.classList.add('collapsed');
                                                                        toggleBtn.textContent = '展开 ▼';
                                                                    }
                                                                } catch (e) {}
                                                            }
                                                            init();
                                                            console.log('🏆 美加墨世界杯彩票记录管理已就绪！');
                                                            console.log('   - 数据自动保存到浏览器本地存储');
                                                            console.log('   - 支持添加/编辑/删除记录');
                                                            console.log('   - 自动计算每日和全局汇总');
                                                            console.log('   - 支持导出CSV文件');
                                                            console.log('   - 快捷键: Ctrl+Enter 快速添加, Esc 关闭弹窗');
                                                        })();
                                                    </script>
                                                </body>
                                                </html>
