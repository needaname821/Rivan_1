<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 美加墨世界杯 - 彩票记录管理</title>
    <style>
        :root {
            --bg: #f0f4f1;
            --surface: #ffffff;
            --surface-alt: #f8faf8;
            --primary: #1a5c2a;
            --primary-light: #2d8a44;
            --gold: #c8960c;
            --gold-light: #f0c040;
            --danger: #c0392b;
            --danger-light: #e74c3c;
            --text: #1a1a2e;
            --text-secondary: #555;
            --border: #dde5db;
            --border-light: #e8efe8;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
            --win-color: #2e7d32;
            --win-bg: #e8f5e9;
            --lose-color: #c0392b;
            --lose-bg: #ffebee;
            --pending-color: #e67e22;
            --pending-bg: #fff8e1;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(26, 92, 42, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(200, 150, 12, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        /* ========== 头部 ========== */
        .app-header {
            text-align: center;
            padding: 28px 20px 18px;
            position: relative;
        }
        .app-header .icon-row {
            font-size: 48px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .app-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a5c2a 0%, #2d8a44 40%, #c8960c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .app-header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 1px;
        }
        /* ========== 全局汇总卡片 ========== */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }
        .summary-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .summary-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        .summary-card .card-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .summary-card .card-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .summary-card .card-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -1px;
        }
        .summary-card.card-invest .card-value {
            color: #1a5c2a;
        }
        .summary-card.card-return .card-value {
            color: #2d8a44;
        }
        .summary-card.card-profit .card-value {
            color: #c8960c;
        }
        .summary-card.card-profit.positive .card-value {
            color: #2e7d32;
        }
        .summary-card.card-profit.negative .card-value {
            color: #c0392b;
        }
        .summary-card.card-count .card-value {
            color: #444;
        }
        .summary-card .card-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        /* ========== 表单区域 ========== */
        .form-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .form-section .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .form-section .form-header h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-section .form-header .toggle-btn {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .form-section .form-header .toggle-btn:hover {
            background: #e8efe8;
            color: var(--primary);
        }
        .form-body {
            margin-top: 16px;
            transition: all 0.3s ease;
        }
        .form-body.collapsed {
            display: none;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
            flex: 1;
        }
        .form-group label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all var(--transition);
            background: var(--surface-alt);
            color: var(--text);
            width: 100%;
            min-width: 100px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(45, 138, 68, 0.1);
            background: #fff;
        }
        .form-group input[type="number"] {
            font-family: var(--font-mono);
            font-weight: 600;
        }
        .form-group input[type="date"] {
            font-family: inherit;
        }
        .form-group .optional-badge {
            font-size: 0.65rem;
            color: #999;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.5px;
            white-space: nowrap;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-add {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(26, 92, 42, 0.3);
            padding: 11px 22px;
            font-size: 0.95rem;
        }
        .btn-add:hover {
            background: #1f6e34;
            box-shadow: 0 4px 14px rgba(26, 92, 42, 0.4);
            transform: translateY(-1px);
        }
        .btn-add:active {
            transform: scale(0.97);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: 6px;
        }
        .btn-edit {
            background: #e8f0e8;
            color: #1a5c2a;
            border: 1px solid #c8d8c8;
        }
        .btn-edit:hover {
            background: #d0e4d0;
        }
        .btn-delete {
            background: #fff;
            color: var(--danger);
            border: 1px solid #f0d0d0;
        }
        .btn-delete:hover {
            background: #fff5f5;
            border-color: #e0b0b0;
        }
        .btn-export {
            background: #fafaf5;
            color: #8a7a20;
            border: 1px solid #e8d8a0;
            font-size: 0.8rem;
        }
        .btn-export:hover {
            background: #fdf8e8;
            border-color: #d8c870;
        }
        .btn-reset {
            background: #fff;
            color: #999;
            border: 1px solid #ddd;
            font-size: 0.78rem;
        }
        .btn-reset:hover {
            background: #fafafa;
            border-color: #ccc;
            color: #666;
        }
        /* ========== 表格区域 ========== */
        .table-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 8px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .table-section .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-section .table-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            font-size: 0.9rem;
        }
        table thead th {
            background: #f4f7f4;
            padding: 12px 10px;
            text-align: left;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        table tbody td {
            padding: 10px 10px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            transition: background var(--transition);
        }
        table tbody tr {
            transition: background var(--transition);
        }
        table tbody tr:hover {
            background: #fafdfa;
        }
        table tbody tr.row-win {
            border-left: 3px solid var(--win-color);
        }
        table tbody tr.row-lose {
            border-left: 3px solid var(--lose-color);
        }
        table tbody tr.row-pending {
            border-left: 3px solid var(--pending-color);
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-align: center;
            min-width: 48px;
        }
        .badge-win {
            background: var(--win-bg);
            color: var(--win-color);
        }
        .badge-lose {
            background: var(--lose-bg);
            color: var(--lose-color);
        }
        .badge-pending {
            background: var(--pending-bg);
            color: var(--pending-color);
        }
        .amount-cell {
            font-family: var(--font-mono);
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
        }
        .return-cell {
            font-family: var(--font-mono);
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }
        .return-cell.win {
            color: var(--win-color);
        }
        .return-cell.lose {
            color: #999;
        }
        .return-cell.pending {
            color: #aaa;
            font-style: italic;
        }
        .actions-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 0.95rem;
        }
        /* 表格内联编辑 */
        .inline-select {
            padding: 5px 8px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            background: #fff;
            transition: all var(--transition);
        }
        .inline-select:focus {
            border-color: var(--primary-light);
            outline: none;
            box-shadow: 0 0 0 2px rgba(45, 138, 68, 0.1);
        }
        .inline-input {
            padding: 5px 8px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            font-size: 0.82rem;
            font-family: var(--font-mono);
            width: 90px;
            text-align: right;
            transition: all var(--transition);
        }
        .inline-input:focus {
            border-color: var(--primary-light);
            outline: none;
            box-shadow: 0 0 0 2px rgba(45, 138, 68, 0.1);
        }
        .inline-input:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
            border-style: dashed;
        }
        /* ========== 每日汇总 ========== */
        .daily-summary-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px 14px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .daily-summary-section h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .daily-table {
            min-width: 600px;
            font-size: 0.85rem;
        }
        .daily-table thead th {
            background: #fafbfa;
            font-size: 0.75rem;
            padding: 10px 10px;
        }
        .daily-table tbody td {
            padding: 9px 10px;
        }
        .daily-table .profit-positive {
            color: #2e7d32;
            font-weight: 700;
        }
        .daily-table .profit-negative {
            color: #c0392b;
            font-weight: 700;
        }
        .daily-table .profit-zero {
            color: #999;
        }
        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 550px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--primary);
        }
        .modal .form-row {
            gap: 10px;
        }
        .modal .form-group {
            min-width: 100px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .btn-cancel {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ddd;
        }
        .btn-cancel:hover {
            background: #e5e5e5;
        }
        .btn-save {
            background: var(--primary);
            color: #fff;
        }
        .btn-save:hover {
            background: #1f6e34;
        }
        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 2000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
            pointer-events: none;
            letter-spacing: 0.3px;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }
        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .app-header h1 {
                font-size: 1.5rem;
            }
            .app-header .icon-row {
                font-size: 36px;
            }
            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .summary-card {
                padding: 14px 16px;
            }
            .summary-card .card-value {
                font-size: 1.4rem;
            }
            .form-row {
                gap: 8px;
            }
            .form-group {
                min-width: 100%;
                flex: 1 1 100%;
            }
            .form-group.date-group,
            .form-group.amount-group {
                min-width: calc(50% - 8px);
                flex: 1 1 calc(50% - 8px);
            }
            .btn-add {
                width: 100%;
                justify-content: center;
            }
            table {
                min-width: 750px;
                font-size: 0.8rem;
            }
            table thead th,
            table tbody td {
                padding: 8px 6px;
            }
            .daily-table {
                min-width: 480px;
            }
            .modal {
                width: 95%;
                padding: 18px;
            }
            .modal .form-group {
                min-width: 100%;
                flex: 1 1 100%;
            }
        }
        @media (max-width: 400px) {
            .summary-cards {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .summary-card .card-value {
                font-size: 1.2rem;
            }
            .summary-card .card-label {
                font-size: 0.7rem;
            }
            .app-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <div class="icon-row">⚽🏆⚽</div>
            <h1>美加墨世界杯 · 彩票记录</h1>
            <p class="subtitle">FIFA World Cup 2026 · 投注管理</p>
        </header>
        <!-- 全局汇总卡片 -->
        <div class="summary-cards" id="summaryCards">
            <div class="summary-card card-invest">
                <div class="card-icon">💰</div>
                <div class="card-label">总投入</div>
                <div class="card-value" id="totalInvest">¥0</div>
                <div class="card-sub" id="totalBets">共 0 笔</div>
            </div>
            <div class="summary-card card-return">
                <div class="card-icon">📥</div>
                <div class="card-label">总回报</div>
                <div class="card-value" id="totalReturn">¥0</div>
                <div class="card-sub" id="settledInfo">已结算 0 笔</div>
            </div>
            <div class="summary-card card-profit" id="profitCard">
                <div class="card-icon">📊</div>
                <div class="card-label">净盈亏</div>
                <div class="card-value" id="totalProfit">¥0</div>
                <div class="card-sub" id="roiInfo">回报率: -</div>
            </div>
            <div class="summary-card card-count">
                <div class="card-icon">🎯</div>
                <div class="card-label">胜率</div>
                <div class="card-value" id="winRate">-</div>
                <div class="card-sub" id="winLossSummary">赢0 / 输0 / 待定0</div>
            </div>
        </div>
        <!-- 添加记录表单 -->
        <div class="form-section" id="formSection">
            <div class="form-header" id="formToggle">
                <h2>📝 添加新记录</h2>
                <button class="toggle-btn" id="toggleBtn">收起 ▲</button>
            </div>
            <div class="form-body" id="formBody">
                <div class="form-row">
                    <div class="form-group date-group">
                        <label>📅 日期</label>
                        <input type="date" id="inputDate" required>
                    </div>
                    <div class="form-group" style="flex:2; min-width:180px;">
                        <label>⚽ 比赛名</label>
                        <input type="text" id="inputMatch" placeholder="例如：美国 vs 加拿大" required list="matchSuggestions">
                        <datalist id="matchSuggestions">
                            <option value="美国 vs 加拿大">
                                <option value="墨西哥 vs 巴西">
                                    <option value="阿根廷 vs 法国">
                                        <option value="英格兰 vs 德国">
                                            <option value="西班牙 vs 葡萄牙">
                                                <option value="日本 vs 韩国">
                                        </datalist>
                                    </div>
                                    <div class="form-group" style="min-width:130px;">
                                        <label>🎯 投注方向</label>
                                        <input type="text" id="inputBetType" placeholder="例如：主胜 / 比分2:1" required list="betTypeSuggestions">
                                        <datalist id="betTypeSuggestions">
                                            <option value="主胜">
                                                <option value="平局">
                                                    <option value="客胜">
                                                        <option value="让球主胜">

                                                                    <input type="text" id="editBetType" required>
                                                                </div>
                                                                <div class="form-group" style="min-width:85px; flex:0.7;">
                                                                    <label>📈 赔率 <span class="optional-badge">(可选)</span></label>
                                                                    <input type="number" id="editOdds" step="0.01" min="0">
                                                                </div>
                                                                <div class="form-group" style="min-width:95px; flex:0.8;">
                                                                    <label>💵 投注金额</label>
                                                                    <input type="number" id="editAmount" step="0.01" min="0.01" required>
                                                                </div>
                                                                <div class="form-group" style="min-width:90px; flex:0.7;">
                                                                    <label>✅ 结果</label>
                                                                    <select id="editResult" required>
                                                                        <option value="pending">⏳ 待定</option>
                                                                        <option value="win">✅ 赢</option>
                                                                        <option value="lose">❌ 输</option>
                                                                    </select>
                                                                </div>
                                                                <div class="form-group" style="min-width:95px; flex:0.8;">
                                                                    <label>💸 回报金额</label>
                                                                    <input type="number" id="editReturn" step="0.01" min="0">

                                                                <button class="btn btn-cancel" id="btnCancelEdit">取消</button>

                                                            </div>
